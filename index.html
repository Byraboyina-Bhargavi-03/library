<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Full Background Image */
            background: url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #4e73df;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #4e73df;
        }

        .btn-custom {
            background-color: #4e73df;
            color: white;
        }

        .btn-custom:hover {
            background-color: #2e59d9;
        }

        .extra-links {
            font-size: 14px;
        }
    </style>

</head>

<body>

<div class="overlay"></div>

<div class="login-card">
    
    <!-- Logo -->
    <div class="text-center mb-4">
        <div class="logo">Library Management System</div>
        <small class="text-muted">Library Management System</small>
    </div>

    <h4 class="text-center mb-4">Login to Your Account</h4>

    <form>
        <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" placeholder="Enter email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Enter password" required>
        </div>

        <div class="d-flex justify-content-between mb-3 extra-links">
            <div>
                <input type="checkbox"> Remember me
            </div>
            <a href="#">Forgot password?</a>
        </div>

      <a href="main.html" class="btn btn-primary w-100">Login</a>

        <div class="text-center mt-3 extra-links">
            Don't have an account? <a href="register.html">Register</a>
        </div>
    </form>

</div>

</body>
</html>
